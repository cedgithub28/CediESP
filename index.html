<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Espagnol">
<meta name="theme-color" content="#0f172a">
<title>Espagnol — Application de révision</title>
<style>
:root{
 --bg:#0f172a;--panel:#111827;--panel2:#1f2937;--text:#f8fafc;--muted:#a8b3c7;
 --blue:#60a5fa;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--border:#334155;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#0f172a 88%,rgba(15,23,42,.75));border-bottom:1px solid var(--border);padding:14px}
h1{font-size:22px;margin:0 0 10px}
.sub{color:var(--muted);font-size:13px;margin:-4px 0 10px}
.search{width:100%;font-size:16px;padding:13px;border:1px solid var(--border);border-radius:15px;background:#020617;color:var(--text)}
.tabs,.filters{display:flex;gap:8px;overflow:auto;padding-top:10px}
button{font-family:inherit}
.tab,.filter{flex:0 0 auto;border:1px solid var(--border);border-radius:999px;padding:9px 12px;background:var(--panel);color:var(--text);font-weight:700}
.tab.active,.filter.active{background:var(--blue);color:#06101f}
main{padding:12px 12px 80px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{border:1px solid var(--border);background:var(--panel);border-radius:16px;padding:10px;text-align:center;color:var(--muted)}
.stat b{display:block;font-size:22px;color:var(--text)}
.section-title{font-size:15px;color:#cbd5e1;margin:18px 4px 8px;font-weight:800}
.card{background:var(--panel);border:1px solid var(--border);border-radius:20px;margin:10px 0;padding:14px;box-shadow:0 8px 18px rgba(0,0,0,.18)}
.card.green{border-color:var(--green);background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(17,24,39,1) 70%)}
.card.red{border-color:var(--red);background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(17,24,39,1) 70%)}
.card h2{font-size:19px;margin:0 0 3px}
.meta{font-size:13px;color:var(--muted);margin-bottom:10px}
.pair{display:grid;grid-template-columns:105px 1fr;gap:10px;align-items:center;border-top:1px solid rgba(148,163,184,.18);padding:10px 0}
.label{color:var(--muted);font-size:13px}
.value{font-size:18px;font-weight:750;word-break:break-word}
.conj .value{font-size:19px}
.extra{background:#020617;border:1px solid var(--border);border-radius:14px;padding:10px;margin:8px 0;color:#dbeafe}
.actions{display:grid;grid-template-columns:1fr 1fr 80px;gap:8px;margin-top:12px}
.actions button{border:0;border-radius:13px;padding:12px 8px;color:white;font-size:14px;font-weight:850}
.ok{background:var(--green)}.ko{background:var(--red)}.reset{background:#475569}
.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.tools button{border:1px solid var(--border);border-radius:13px;padding:10px;background:var(--panel2);color:var(--text);font-weight:750}
.empty{text-align:center;color:var(--muted);padding:30px}
.badge{display:inline-block;border:1px solid var(--border);border-radius:999px;padding:3px 8px;color:#cbd5e1;font-size:12px;margin-left:6px}
@media(min-width:700px){main{max-width:820px;margin:auto}.pair{grid-template-columns:150px 1fr}}

.speak{border:1px solid rgba(96,165,250,.6);background:#0b3b66;color:#dbeafe;border-radius:999px;padding:7px 10px;font-size:15px;font-weight:900;min-width:42px}
.valueRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.valueText{flex:1}
.audioStatus{position:fixed;left:12px;right:12px;bottom:12px;background:#020617;border:1px solid var(--border);border-radius:16px;padding:10px 12px;color:#dbeafe;display:none;z-index:99;text-align:center}

</style>
</head>
<body>
<header>
 <h1>📚 Espagnol — Révision logique</h1>
 <div class="sub">Chaque carte regroupe les informations ensemble : par exemple <b>yo hablo</b>, <b>tú hablas</b>, etc.</div>
 <input id="search" class="search" placeholder="Rechercher : yo hablo, querer, négation, vocabulaire...">
 <div id="tabs" class="tabs"></div>
 <div class="filters">
   <button class="filter active" data-filter="all">Tout</button>
   <button class="filter" data-filter="todo">À revoir</button>
   <button class="filter" data-filter="green">✅ Connu</button>
   <button class="filter" data-filter="red">❌ Difficile</button>
 </div>
 <div class="tools">
   <button onclick="exportProgress()">Exporter progrès</button>
   <button onclick="resetProgress()">Réinitialiser</button>
 </div>
</header>
<main>
 <div class="stats">
  <div class="stat"><b id="known">0</b>connus</div>
  <div class="stat"><b id="hard">0</b>difficiles</div>
  <div class="stat"><b id="todo">0</b>à revoir</div>
 </div>
 <div id="content"></div>
</main>
<div id="audioStatus" class="audioStatus"></div>

    .replace(/\bSpalte\d*\b/gi,"")
    .replace(/\bFrançais\b|\bFrancais\b|\bEspagnol\b|\bPhonétique\b/gi,"")
    .replace(/[—–]/g," ")
    .replace(/\.\.\./g,"")
    .replace(/\s+/g," ")
    .trim();
}
function getSpeakText(label, value, item){
  const l=String(label||"").toLowerCase();
  let v=cleanSpeakText(value);
  if(!v) return "";
  if(l.includes("français") || l.includes("francais") || l.includes("phonétique") || l.includes("phonetique") || l.includes("indice")) return "";
  if(item.type==="conjugaison"){
    if(v.includes("—")) return "";
    return v;
  }
  if(l.includes("espagnol") || l.includes("correction")) return v;
  if(item.sheet.toLowerCase().includes("négations") || item.sheet.toLowerCase().includes("negations")){
    if(!l.includes("français") && !l.includes("francais")) return v;
  }
  return "";
}
function speakSpanish(text){
  text=cleanSpeakText(text);
  if(!text) return;
  const status=document.getElementById("audioStatus");
  if(!("speechSynthesis" in window)){
    status.textContent="La lecture vocale n'est pas disponible sur ce navigateur.";
    status.style.display="block";
    setTimeout(()=>status.style.display="none",3000);
    return;
  }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="es-ES";
  u.rate=0.82;
  u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang && v.lang.toLowerCase().startsWith("es"));
  if(esVoice) u.voice=esVoice;
  status.textContent="🔊 " + text;
  status.style.display="block";
  u.onend=()=>setTimeout(()=>status.style.display="none",800);
  u.onerror=()=>setTimeout(()=>status.style.display="none",1200);
  window.speechSynthesis.speak(u);
}
if("speechSynthesis" in window){ window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices(); }
function save(){localStorage.setItem("espagnol_progress_v2", JSON.stringify(progress));}
function statusOf(id){return progress[id] || "todo";}
function textOf(item){return [item.sheet,item.section,item.title,item.extra,...item.pairs.flat()].join(" ").toLowerCase();}
function setStatus(id, st){ if(st==="todo") delete progress[id]; else progress[id]=st; save(); render(); }

function buildTabs(){
 const tabs=document.getElementById("tabs"); tabs.innerHTML="";
 SHEETS.forEach((s,i)=>{
   const count=s.items.length;
   const b=document.createElement("button");
   b.className="tab"+(i===current?" active":"");
   b.innerHTML=esc(s.name)+` <span class="badge">${count}</span>`;
   b.onclick=()=>{current=i;render();};
   tabs.appendChild(b);
 });
}
document.querySelectorAll(".filter").forEach(b=>{
 b.onclick=()=>{document.querySelectorAll(".filter").forEach(x=>x.classList.remove("active"));b.classList.add("active");activeFilter=b.dataset.filter;render();}
});
document.getElementById("search").addEventListener("input", render);

function computeStats(){
 let known=0, hard=0, todo=0;
 SHEETS.forEach(s=>s.items.forEach(it=>{
   const st=statusOf(it.id);
   if(st==="green") known++; else if(st==="red") hard++; else todo++;
 }));
 document.getElementById("known").textContent=known;
 document.getElementById("hard").textContent=hard;
 document.getElementById("todo").textContent=todo;
}

function render(){
 buildTabs(); computeStats();
 const q=document.getElementById("search").value.trim().toLowerCase();
 const box=document.getElementById("content"); box.innerHTML="";
 const sheet=SHEETS[current];
 let lastSection="", shown=0;
 sheet.items.forEach(item=>{
   const st=statusOf(item.id);
   if(activeFilter!=="all" && activeFilter!==st) return;
   if(q && !textOf(item).includes(q)) return;
   if(item.section && item.section!==lastSection){
     const h=document.createElement("div"); h.className="section-title"; h.textContent=item.section;
     box.appendChild(h); lastSection=item.section;
   }
   const card=document.createElement("div");
   card.className=`card ${st==="todo"?"":st} ${item.type==="conjugaison"?"conj":""}`;
   const pairs=item.pairs.map(([a,b])=>{
     const speakText = getSpeakText(a,b,item);
     const btn = speakText ? `<button class="speak" onclick="event.stopPropagation(); speakSpanish('${escAttr(speakText)}')">🔊</button>` : "";
     return `<div class="pair"><div class="label">${esc(a)}</div><div class="value"><div class="valueRow"><span class="valueText">${esc(b)}</span>${btn}</div></div></div>`;
   }).join("");
   card.innerHTML=`
    <h2>${esc(item.title)} <span class="badge">${esc(item.type)}</span></h2>
    <div class="meta">${esc(item.sheet)}${item.section ? " • "+esc(item.section) : ""}</div>
    ${item.extra ? `<div class="extra">${esc(item.extra)}</div>` : ""}
    ${pairs}
    <div class="actions">
      <button class="ok" onclick="setStatus('${item.id}','green')">✅ Je connais</button>
      <button class="ko" onclick="setStatus('${item.id}','red')">❌ Difficile</button>
      <button class="reset" onclick="setStatus('${item.id}','todo')">Reset</button>
    </div>`;
   box.appendChild(card); shown++;
 });
 if(!shown) box.innerHTML='<div class="empty">Aucun résultat dans cet onglet.</div>';
}

function exportProgress(){
 const blob=new Blob([JSON.stringify(progress,null,2)],{type:"application/json"});
 const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="progres_espagnol.json"; a.click();
}
function resetProgress(){
 if(confirm("Effacer toutes les couleurs ?")){progress={};save();render();}
}
render();
</script>
